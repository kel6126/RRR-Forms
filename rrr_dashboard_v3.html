<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revenue Risk Roundtable</title>
<style>/* fonts loaded locally */</style>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1B2A4A;--orange:#F47920;
  --bg:#EEF1F8;--surface:#FFFFFF;--surface2:#F5F7FC;--surface3:#EBEEF6;
  --border:#DDE2EE;--border2:#C8CFDF;
  --text:#0D1B2E;--text2:#4A5873;--text3:#8896AD;
  --red:#DC2626;--red-bg:#FEF2F2;--red-border:#FECACA;
  --amb:#B45309;--amb-bg:#FFFBEB;--amb-border:#FDE68A;
  --grn:#059669;--grn-bg:#ECFDF5;--grn-border:#6EE7B7;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#BFDBFE;
  --purp:#7C3AED;--purp-bg:#F5F3FF;--purp-border:#DDD6FE;
  --shadow:0 1px 3px rgba(13,27,46,.07),0 2px 8px rgba(13,27,46,.04);
  --shadow-md:0 4px 12px rgba(13,27,46,.1),0 1px 3px rgba(13,27,46,.06);
  --r:10px;--r-lg:14px;--sidebar:272px;
}
body.dark{
  --bg:#0C1420;--surface:#162030;--surface2:#1C2A3E;--surface3:#243244;
  --border:#243244;--border2:#2E3F58;
  --text:#E2EAF4;--text2:#8BA4C0;--text3:#526A84;
  --red-bg:#1F0A0A;--red-border:#5C1A1A;
  --amb-bg:#1F1505;--amb-border:#5C3A0A;
  --grn-bg:#051F12;--grn-border:#0A5C30;
  --blue-bg:#050F1F;--blue-border:#0A2A5C;
  --purp-bg:#0F0A1F;--purp-border:#2A1A5C;
}
body{font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;background:var(--bg);color:var(--text);font-size:14px;height:100vh;overflow:hidden;transition:background .25s,color .25s}

.tb{height:52px;background:var(--navy);display:flex;align-items:center;padding:0 16px;gap:12px;position:fixed;inset:0 0 auto;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.tb-logo{width:30px;height:30px;background:var(--orange);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.tb-title{color:#fff;font-size:15px;font-weight:500;flex:1}
.tb-right{display:flex;align-items:center;gap:6px}
.mtg-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.mtg-btn.off{background:rgba(255,255,255,.1);color:rgba(255,255,255,.65)}
.mtg-btn.on{background:#EF4444;color:#fff;box-shadow:0 0 0 3px rgba(239,68,68,.3)}
.theme-btn{width:32px;height:32px;border-radius:8px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.theme-btn:hover{background:rgba(255,255,255,.18)}
.nav-tab{padding:5px 13px;border-radius:7px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:rgba(255,255,255,.55);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;transition:all .15s}
.nav-tab.on{background:var(--orange);color:#fff}
.nav-tab:not(.on):hover{background:rgba(255,255,255,.1);color:#fff}
.mtg-clk{font-size:12px;color:rgba(255,255,255,.45);font-family:Consolas, Monaco, monospace;display:none}

.app{margin-top:52px;height:calc(100vh - 52px);display:flex;overflow:hidden}

/* sidebar */
.sb{width:var(--sidebar);flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-search{padding:10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-search-box{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px}
.sb-search-box input{border:none;background:transparent;font-size:13px;color:var(--text);flex:1;outline:none;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif}
.sb-search-box input::placeholder{color:var(--text3)}
.sb-body{flex:1;overflow-y:auto;padding:6px 6px 0}
.sb-body::-webkit-scrollbar{width:3px}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sb-section-hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 8px 4px}
.sb-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:5px}
.sb-cnt{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:var(--surface3);color:var(--text3)}
.sb-divider{height:1px;background:var(--border);margin:6px 6px}
.proj-row{padding:8px 9px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .1s;margin-bottom:1px}
.proj-row:hover{background:var(--surface2)}
.proj-row.sel{background:var(--blue-bg);border:1px solid var(--blue-border)}
body.dark .proj-row.sel{background:rgba(37,99,235,.15);border-color:rgba(37,99,235,.3)}
.p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.proj-row-info{flex:1;min-width:0}
.proj-row-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-row.sel .proj-row-name{color:var(--blue)}
.proj-row-sub{font-size:10px;color:var(--text3);margin-top:1px}
.proj-row-bo{font-size:11px;font-weight:700;color:var(--red);flex-shrink:0}
.sb-footer{padding:8px;border-top:1px solid var(--border);flex-shrink:0}
.sb-add-btn{width:100%;padding:7px;border-radius:8px;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:12px;font-weight:500;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;transition:all .15s}
.sb-add-btn:hover{border-color:var(--orange);color:var(--orange)}

/* main */
.main{flex:1;overflow-y:auto;padding:16px 20px}
.main::-webkit-scrollbar{width:5px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* project header */
.pdh{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px}
.pd-title{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-bottom:5px}
body.meeting .pd-title{font-size:26px}
.pd-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ptag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:5px;border:1px solid}
.pd-actions{display:flex;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.act-btn{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap}
.act-btn:hover{background:var(--surface2)}
.act-btn.ldr-btn{border-color:var(--purp-border);color:var(--purp);background:var(--purp-bg)}
.act-btn.close-btn{border-color:var(--grn-border);color:var(--grn);background:var(--grn-bg)}

/* 5-col metric grid */
.mg{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px}
.mt{background:var(--surface);border-radius:var(--r-lg);padding:13px 14px;border:1px solid var(--border);box-shadow:var(--shadow)}
.mt-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;display:flex;align-items:center;gap:4px}
.mt-val{font-size:26px;font-weight:700;line-height:1;letter-spacing:-.5px;margin-bottom:5px}
body.meeting .mt-val{font-size:32px}
.mt-sub{font-size:11px;color:var(--text3);line-height:1.4}
.stat-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;font-size:13px;font-weight:700;border:1.5px solid;margin-bottom:7px}
.stat-btns{display:flex;gap:4px}
.s-btn{flex:1;padding:5px 2px;border-radius:6px;border:1px solid var(--border);background:transparent;font-size:10px;font-weight:600;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;color:var(--text2);transition:all .12s;text-align:center}
.s-btn.ac{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.s-btn.ar{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-border)}
.s-btn.ao{background:var(--grn-bg);color:var(--grn);border-color:var(--grn-border)}
.auto-note{font-size:10px;color:var(--text3);margin-top:5px;line-height:1.4}
.red{color:var(--red)}.amb{color:var(--amb)}.grn{color:var(--grn)}.purp{color:var(--purp)}

/* product line tags */
.pl-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.pl-tag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;background:var(--surface3);border:1px solid var(--border2);color:var(--text2)}

/* section cards */
.sc{background:var(--surface);border-radius:var(--r-lg);padding:14px 15px;border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:12px}
.sc-hdr{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.ow-row{display:flex;align-items:center;gap:10px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.av{width:30px;height:30px;border-radius:50%;background:var(--blue-bg);border:1px solid var(--blue-border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);flex-shrink:0}
.ow-nm{font-size:13px;font-weight:600;color:var(--text)}
.ow-rl{font-size:11px;color:var(--text3)}
.cr-b{font-size:11px;padding:2px 8px;border-radius:6px;background:var(--surface3);color:var(--text2);border:1px solid var(--border);font-family:Consolas, Monaco, monospace;margin-left:auto}
.bg-txt{font-size:13px;color:var(--text2);line-height:1.7}
body.meeting .bg-txt{font-size:15px}

/* updates */
.upd-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.va-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px;border:1px solid var(--blue-border);background:var(--blue-bg);color:var(--blue);cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif}
.u-item{padding:10px 12px;border-radius:8px;margin-bottom:7px}
.u-item.lat{background:var(--blue-bg);border:1px solid var(--blue-border)}
.u-item.prv{background:var(--surface2);border:1px solid var(--border)}
.u-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px;flex-wrap:wrap}
.u-date{font-size:11px;font-weight:700;color:var(--text);font-family:Consolas, Monaco, monospace}
.u-auth{font-size:11px;color:var(--text3)}
.u-tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.04em}
.u-txt{font-size:13px;color:var(--text2);line-height:1.65}
body.meeting .u-txt{font-size:15px}

/* add update */
.au-box{background:var(--surface);border-radius:var(--r-lg);border:2px solid var(--orange);padding:13px 14px;box-shadow:var(--shadow)}
.au-title{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:flex;align-items:center;gap:6px}
.ldot{width:7px;height:7px;border-radius:50%;background:#EF4444;animation:bl 1.5s infinite;display:inline-block}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.au-row{display:flex;gap:7px;margin-bottom:7px}
.ai{border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface2);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;outline:none;transition:border-color .15s}
.ai:focus{border-color:var(--orange)}
.ata{width:100%;border:1px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;color:var(--text);background:var(--surface2);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;outline:none;resize:none;min-height:74px;line-height:1.55;transition:border-color .15s;margin-bottom:7px}
.ata:focus{border-color:var(--orange)}
.asel{border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface2);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;outline:none;flex:1}
.pb{padding:7px 18px;border-radius:7px;border:none;background:var(--orange);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif}
.pb:hover{opacity:.88}
.au-toast{font-size:12px;color:var(--grn);font-weight:600;display:none}

/* forms */
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.fg4{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:11px;font-weight:500;color:var(--text2)}
.req{color:#EF4444}
.fc{grid-column:1/-1}
.fi{border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface2);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;outline:none;width:100%}
.fi:focus{border-color:var(--orange)}
.fta{border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-size:13px;color:var(--text);background:var(--surface2);font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;outline:none;width:100%;resize:vertical;min-height:68px;line-height:1.5}
.fta:focus{border-color:var(--orange)}
.sv-btn{padding:7px 18px;border-radius:7px;border:none;background:#059669;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif}
.cn-btn{padding:7px 13px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:13px;cursor:pointer;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif}
.panel{background:var(--surface);border-radius:var(--r-lg);border:2px solid #2563EB;padding:14px 15px;margin-bottom:14px;display:none}
.panel.open{display:block}
.panel-hdr{font-size:13px;font-weight:600;color:#2563EB;margin-bottom:13px;display:flex;justify-content:space-between;align-items:center}

/* multi-select product lines */
.pl-select{display:flex;flex-wrap:wrap;gap:5px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px}
.pl-opt{font-size:12px;padding:3px 10px;border-radius:12px;border:1px solid var(--border2);cursor:pointer;background:var(--surface);color:var(--text2);transition:all .12s;user-select:none}
.pl-opt.sel{background:var(--navy);color:#fff;border-color:var(--navy)}
.pl-opt.add-new{border-style:dashed;color:var(--text3)}
.pl-opt.add-new:hover{border-color:var(--orange);color:var(--orange)}

/* drawer */
.dov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end;justify-content:center}
.dov.open{display:flex}
.drw{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:820px;max-height:80vh;display:flex;flex-direction:column;animation:su .2s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.drw-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.drw-body{overflow-y:auto;padding:14px 18px;flex:1}
.drw-close{width:28px;height:28px;border-radius:7px;border:none;background:var(--surface2);color:var(--text2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* dashboard - full width */
.dash-full{width:100%;padding:18px 20px;overflow-y:auto;flex:1}
.kpi-g{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:14px;width:100%}
.kpi-c{background:var(--surface);border-radius:var(--r-lg);padding:13px 14px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
.kpi-c:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kpi-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.kpi-v{font-size:24px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kpi-s{font-size:11px;color:var(--text3);margin-top:4px}
.perf-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;width:100%}
.pf-c{background:var(--surface);border-radius:var(--r-lg);padding:15px;border:1px solid var(--border);box-shadow:var(--shadow)}
.pf-l{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.pf-v{font-size:30px;font-weight:700;line-height:1;letter-spacing:-.5px;margin-bottom:5px}
.pf-s{font-size:12px;color:var(--text3);line-height:1.5}
.cht-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;width:100%}
.cht-c{background:var(--surface);border-radius:var(--r-lg);padding:15px;border:1px solid var(--border);box-shadow:var(--shadow)}
.cht-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.cht-s{font-size:11px;color:var(--text3);margin-bottom:12px}
.chart-wrap{display:flex;gap:6px}
.y-axis{display:flex;flex-direction:column;justify-content:space-between;padding-bottom:16px;flex-shrink:0;width:32px}
.y-lbl{font-size:9px;color:var(--text3);text-align:right;font-family:Consolas, Monaco, monospace}
.bars-area{flex:1}
.bars{display:flex;align-items:flex-end;gap:3px;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px;transition:height .3s}
.bar-lbl{font-size:8px;color:var(--text3);font-family:Consolas, Monaco, monospace;text-align:center}
.cht-leg{display:flex;gap:10px;margin-top:8px;flex-wrap:wrap}
.leg-i{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3)}
.leg-d{width:8px;height:8px;border-radius:2px;flex-shrink:0}

/* bottom row 2-col */
.bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;width:100%}
.bo-ac{background:var(--surface);border-radius:var(--r-lg);padding:15px;border:1px solid var(--border);box-shadow:var(--shadow)}
.al-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.al-row:last-child{border-bottom:none}

/* pie chart */
.pie-wrap{display:flex;align-items:center;gap:12px;justify-content:center}
.pie-legend{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;max-width:180px}
.pie-leg-row{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2)}
.pie-leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.pie-leg-val{font-size:11px;font-weight:600;color:var(--text);margin-left:auto;flex-shrink:0}

/* closed tab */
.closed-row{background:var(--surface);border-radius:var(--r);padding:12px 14px;border:1px solid var(--border);margin-bottom:7px;display:flex;align-items:flex-start;gap:12px}
.days-badge{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px;flex-shrink:0}
.timing-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;flex-shrink:0}

/* confirm modal */
.conf-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.conf-ov.open{display:flex}
.conf-box{background:var(--surface);border-radius:var(--r-lg);padding:22px 24px;max-width:400px;width:92%;box-shadow:var(--shadow-md)}
.conf-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.conf-sub{font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.55}
.timing-row{display:flex;gap:8px;margin-bottom:18px}
.timing-opt{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;text-align:center;font-family:-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;transition:all .15s}
.timing-opt:hover{background:var(--surface2)}
.timing-opt.sel-ontime{background:var(--grn-bg);border-color:var(--grn-border)}
.timing-opt.sel-late{background:var(--red-bg);border-color:var(--red-border)}
.timing-opt .t-icon{font-size:20px;margin-bottom:4px}
.timing-opt .t-label{font-size:12px;font-weight:600;color:var(--text2)}

function gr(p){

    {s:'Critical',l:'Line down passed',met:ld!==null&&ld<=0},

    {s:'At Risk',l:'Proj BO &#8805; '+fm(TH.ar),met:!!(p.bp&&p.bp>=TH.ar&&p.bp<TH.cr)},
    {s:'At Risk',l:'BO start &#8804; 60d',met:bs!==null&&bs>=0&&bs<=60&&!(bs<=TH.dy)},
    {s:'At Risk',l:'Resolution overdue',met:rs!==null&&rs<0},
  ];
}
function autos(p){const r=gr(p);if(r.some(x=>x.s==='Critical'&&x.met))return'Critical';if(r.some(x=>x.s==='At Risk'&&x.met))return'At Risk';return'On Track';}
function effs(p){return p.ms||autos(p);}
function sortP(arr){const o={Critical:0,'At Risk':1,'On Track':2};return[...arr].sort((a,b)=>o[effs(a)]-o[effs(b)]);}

function renderSB(){
  const q=(document.getElementById('srch')||{}).value?.toLowerCase()||'';
  let list=P.filter(p=>!q||p.n.toLowerCase().includes(q)||p.o.toLowerCase().includes(q));
  if(dashFilter)list=list.filter(p=>effs(p)===dashFilter);
  const ldr=sortP(list.filter(p=>p.sec==='Leadership'));
  const gen=sortP(list.filter(p=>p.sec!=='Leadership'));
  const el=document.getElementById('sb-body');if(!el)return;
  const row=p=>{
    const sc=SC[effs(p)]||SC['On Track'],isSel=selId===p.id;
    return`<div class="proj-row${isSel?' sel':''}" onclick="selProj(${p.id})">

      </div>
      ${p.bp||p.cb?`<div class="proj-row-bo">${fm(p.bp||p.cb)}</div>`:''}
    </div>`;
  };
  el.innerHTML=`
    <div>
      <div class="sb-section-hdr"><span class="sb-lbl">* Leadership <span class="sb-cnt">${ldr.length}</span></span></div>

}

      <div>
        <div class="pd-title">${p.n}</div>
        <div class="pd-meta">
          <span class="ptag" style="background:${(CC[p.cat]||'#888')}18;color:${CC[p.cat]||'#888'};border-color:${(CC[p.cat]||'#888')}35">${p.cat}</span>
          ${isLdr?'<span class="ptag" style="background:var(--purp-bg);color:var(--purp);border-color:var(--purp-border)">* Leadership</span>':''}
          <span style="font-size:12px;color:var(--text3)">&#183; ${p.o}${p.cr?' &#183; <span style="font-family:DM Mono,monospace">'+p.cr+'</span>':''} &#183; updated ${lat?lat.d:'&#8212;'}</span>
        </div>
        ${(p.pl||[]).length?`<div class="pl-wrap" style="margin-top:5px">${(p.pl||[]).map(x=>`<span class="pl-tag">${x}</span>`).join('')}</div>`:''}
      </div>
      <div class="pd-actions">
        <button class="act-btn ldr-btn" onclick="toggleLdr(${p.id})">${isLdr?'v Move out':'* Leadership'}</button>

let editPL={};
function togglePL(id,opt,el){
  const p=P.find(x=>x.id===id);if(!p)return;
  if(!editPL[id])editPL[id]=[...(p.pl||[])];
  const idx=editPL[id].indexOf(opt);
  if(idx>-1){editPL[id].splice(idx,1);el.classList.remove('sel');}
  else{editPL[id].push(opt);el.classList.add('sel');}
}
function addNewPL(id){
  const name=prompt('Enter new product line name:');
  if(!name||!name.trim())return;
  const n=name.trim();
  if(!PL_OPTIONS.includes(n))PL_OPTIONS.push(n);
  if(!editPL[id])editPL[id]=[...(P.find(x=>x.id===id)?.pl||[])];
  editPL[id].push(n);
  // re-render the selector
  const c=document.getElementById('pl-sel-'+id);
  if(c)c.innerHTML=PL_OPTIONS.map(opt=>`<span class="pl-opt${editPL[id].includes(opt)?' sel':''}" onclick="togglePL(${id},'${opt}',this)">${opt}</span>`).join('')+
    `<span class="pl-opt add-new" onclick="addNewPL(${id})">+ Add new</span>`;
}

function saveBg(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  p.o=document.getElementById('bgo'+id)?.value||p.o;
  p.cr=document.getElementById('bgcr'+id)?.value||p.cr;
  p.bg=document.getElementById('bgbg'+id)?.value||p.bg;
  const cbv=document.getElementById('bgcb'+id)?.value;p.cb=cbv?Number(cbv):p.cb;
  const bpv=document.getElementById('bgbp'+id)?.value;p.bp=bpv?Number(bpv):p.bp;
  p.bs=document.getElementById('bgbs'+id)?.value||null;
  p.ld=document.getElementById('bgld'+id)?.value||null;
  p.res=document.getElementById('bgres'+id)?.value||null;
  if(editPL[id])p.pl=editPL[id];
  delete editPL[id];
  renderDetail();renderSB();
}

// &#9472;&#9472; Dashboard &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function renderDash(){
  const active=P;
  const crit=active.filter(p=>effs(p)==='Critical').length;
  const ar=active.filter(p=>effs(p)==='At Risk').length;
  const ot=active.filter(p=>effs(p)==='On Track').length;
  const newMo=active.filter(p=>{const d=new Date(p.add||'');return d.getFullYear()===2026&&d.getMonth()===3;}).length;
  const closedMo=closed.filter(p=>{if(!p.closed)return false;const d=new Date(p.closed);return d.getFullYear()===2026&&d.getMonth()===3;}).length;
  const tr=active.reduce((s,p)=>s+(p.bp||0),0);
  const totalCurBO=active.reduce((s,p)=>s+(p.cb||0),0);

  const allDays=closed.map(p=>{if(!p.add||!p.closed)return null;return Math.round((new Date(p.closed)-new Date(p.add))/864e5);}).filter(d=>d!==null);
  const gMTC=allDays.length?Math.round(allDays.reduce((a,b)=>a+b,0)/allDays.length):null;
  const totBOA=closed.reduce((s,p)=>s+(p.bp||0),0);
  const onTimePct=closed.length?Math.round(closed.filter(p=>p.timing==='ontime').length/closed.length*100):null;

  // charts data
  const abm=MO.map((_,i)=>active.filter(p=>{const d=new Date(p.add||'');return d.getFullYear()===2026&&d.getMonth()===i;}).length);
  const cbm=MO.map((_,i)=>closed.filter(p=>{if(!p.closed)return false;const d=new Date(p.closed);return d.getFullYear()===2026&&d.getMonth()===i;}).length);
  const boabm=MO.map((_,i)=>closed.filter(p=>{if(!p.closed)return false;const d=new Date(p.closed);return d.getFullYear()===2026&&d.getMonth()===i;}).reduce((s,p)=>s+(p.bp||0),0));
  const mtcbm=MO.map((_,i)=>{const c=closed.filter(p=>{if(!p.closed)return false;const d=new Date(p.closed);return d.getFullYear()===2026&&d.getMonth()===i;});const days=c.map(p=>Math.round((new Date(p.closed)-new Date(p.add))/864e5));return days.length?Math.round(days.reduce((a,b)=>a+b,0)/days.length):0;});

  const makeChart=(data,colorFn,labelFn)=>{
    const mx=Math.max(...data,1);
    const y=[mx,Math.round(mx*.66),Math.round(mx*.33),0];
    return`<div class="chart-wrap">
      <div class="y-axis">${y.map(v=>`<div class="y-lbl">${labelFn(v)}</div>`).join('')}</div>
      <div class="bars-area"><div class="bars">${data.map((v,i)=>`<div class="bar-col"><div class="bar-fill" style="height:${v>0?Math.max(3,(v/mx)*76):2}px;background:${colorFn(v,i)}"></div><span class="bar-lbl">${MO[i]}</span></div>`).join('')}</div></div>
    </div>`;
  };
  const stackedChart=()=>{
    const mx=Math.max(...abm.map((v,i)=>v+cbm[i]),1);
    const y=[mx,Math.round(mx*.66),Math.round(mx*.33),0];
    return`<div class="chart-wrap">
      <div class="y-axis">${y.map(v=>`<div class="y-lbl">${v}</div>`).join('')}</div>
      <div class="bars-area"><div class="bars">${MO.map((_,i)=>`<div class="bar-col">
        <div style="display:flex;flex-direction:column;align-items:center;gap:1px;width:100%">
          <div class="bar-fill" style="height:${abm[i]>0?Math.max(3,(abm[i]/mx)*76):2}px;background:#93C5FD"></div>
          <div class="bar-fill" style="height:${cbm[i]>0?Math.max(2,(cbm[i]/mx)*38):0}px;background:var(--grn);border-radius:0 0 3px 3px"></div>
        </div><span class="bar-lbl">${MO[i]}</span></div>`).join('')}</div></div>
    </div>`;
  };

  // Pie chart &#8212; revenue risk by product line
  const plMap={};
  active.forEach(p=>{if(!p.bp)return;(p.pl||[]).forEach(pl=>{plMap[pl]=(plMap[pl]||0)+p.bp;});});
  const plEntries=Object.entries(plMap).sort((a,b)=>b[1]-a[1]);
  const plTotal=plEntries.reduce((s,[,v])=>s+v,0)||1;
  const pieHTML=()=>{
    if(!plEntries.length)return'<div style="font-size:12px;color:var(--text3);padding:16px 0;text-align:center">No product line data yet</div>';
    // SVG pie
    let startAngle=-Math.PI/2,svgPaths='';
    plEntries.forEach(([name,val],i)=>{
      const slice=(val/plTotal)*2*Math.PI;
      const x1=50+45*Math.cos(startAngle),y1=50+45*Math.sin(startAngle);
      const x2=50+45*Math.cos(startAngle+slice),y2=50+45*Math.sin(startAngle+slice);
      const large=slice>Math.PI?1:0;
      svgPaths+=`<path d="M50 50 L${x1} ${y1} A45 45 0 ${large} 1 ${x2} ${y2} Z" fill="${PIE_COLORS[i%PIE_COLORS.length]}" stroke="var(--surface)" stroke-width="1.5"/>`;
      startAngle+=slice;
    });
    const legendRows=plEntries.slice(0,6).map(([name,val],i)=>`
      <div class="pie-leg-row">
        <span class="pie-leg-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${name}</span>
        <span class="pie-leg-val">${fm(val)}</span>
      </div>`).join('');
    return`<div class="pie-wrap">
      <svg viewBox="0 0 100 100" width="90" height="90" style="flex-shrink:0">${svgPaths}</svg>
      <div class="pie-legend">${legendRows}${plEntries.length>6?`<div style="font-size:10px;color:var(--text3)">+${plEntries.length-6} more</div>`:''}</div>
    </div>`;
  };

  // BO alerts
  const alerts=active.filter(p=>{if(!p.bs)return false;const d=new Date(p.bs);return (d-TODAY)/864e5<=60&&d>=TODAY;}).sort((a,b)=>new Date(a.bs)-new Date(b.bs));

  document.getElementById('dash').innerHTML=`
    <div class="kpi-g">
      ${[
        {l:'Active projects',v:active.length,c:'var(--text)',s:'open',f:''},
        {l:'Critical',v:crit,c:'var(--red)',s:'need action now',f:'Critical'},
        {l:'At risk',v:ar,c:'var(--amb)',s:'monitoring',f:'At Risk'},
        {l:'On track',v:ot,c:'var(--grn)',s:'no concerns',f:'On Track'},
        {l:'New this month',v:newMo,c:'#2563EB',s:'added Apr 2026',f:''},
        {l:'Closed this month',v:closedMo,c:'var(--grn)',s:'completed Apr 2026',f:'closed'},
      ].map(k=>`<div class="kpi-c" onclick="${k.f==='closed'?"showTab('closed',document.querySelectorAll('.nav-tab')[2])":k.f?`goToFiltered('${k.f}')`:''}" title="${k.f?'Click to filter':''}">
        <div class="kpi-l">${k.l}</div>
        <div class="kpi-v" style="color:${k.c}">${k.v}</div>
        <div class="kpi-s">${k.s}</div>
      </div>`).join('')}
    </div>
    <div class="perf-g">
      <div class="pf-c"><div class="pf-l">Mean time to close</div><div class="pf-v" style="color:var(--purp)">${gMTC!==null?gMTC+'d':'&#8212;'}</div><div class="pf-s">All-time avg &#183; ${allDays.length} closed projects${onTimePct!==null?' &#183; '+onTimePct+'% on time':''}</div></div>
      <div class="pf-c"><div class="pf-l">BO avoidance &#8212; all time</div><div class="pf-v" style="color:var(--grn)">${fm(totBOA)}</div><div class="pf-s">Revenue risk across ${closed.length} closed projects</div></div>
      <div class="pf-c"><div class="pf-l">Total revenue risk (active)</div><div class="pf-v" style="color:var(--red)">${fm(tr)}</div><div class="pf-s">Active BO: ${fm(totalCurBO)} &#183; ${active.filter(p=>p.bp).length} projects with $ captured</div></div>
    </div>
    <div class="cht-g">
      <div class="cht-c"><div class="cht-t">Projects added vs. closed &#8212; 2026</div><div class="cht-s">Monthly count</div>${stackedChart()}<div class="cht-leg"><span class="leg-i"><span class="leg-d" style="background:#93C5FD"></span>Added</span><span class="leg-i"><span class="leg-d" style="background:var(--grn)"></span>Closed</span></div></div>
      <div class="cht-c"><div class="cht-t">Mean days to close &#8212; 2026</div><div class="cht-s">Avg per month closed</div>${makeChart(mtcbm,v=>v>90?'var(--red)':v>45?'var(--amb)':v>0?'var(--purp)':'var(--border)',v=>v+'d')}<div class="cht-leg"><span class="leg-i"><span class="leg-d" style="background:var(--purp)"></span>&#8804;45d</span><span class="leg-i"><span class="leg-d" style="background:var(--amb)"></span>45&#8211;90d</span><span class="leg-i"><span class="leg-d" style="background:var(--red)"></span>>90d</span></div></div>
      <div class="cht-c"><div class="cht-t">BO avoidance &#8212; 2026</div><div class="cht-s">Revenue risk avoided by month closed</div>${makeChart(boabm,v=>v>0?'var(--grn)':'var(--border)',v=>v>=1000?'$'+Math.round(v/1000)+'K':v>0?'$'+v:'0')}<div class="cht-leg"><span class="leg-i"><span class="leg-d" style="background:var(--grn)"></span>BO avoided</span></div></div>
    </div>
    <div class="bottom-row">
      <div class="bo-ac">
        <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">! Backorder alerts &#8212; next 60 days</div>
        ${alerts.map(p=>`<div class="al-row">
          <div class="p-dot" style="background:${SC[effs(p)]?.dot}"></div>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.n}</div>
          <div style="font-size:11px;color:var(--text3)">${p.o}${(p.pl||[]).length?' &#183; '+p.pl.join(', '):''}</div></div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:12px;font-weight:600">${p.bs}</div>
            ${p.cb?`<div style="font-size:12px;font-weight:700;color:var(--red)">${fm(p.cb)} active</div>`:''}
            ${p.bp?`<div style="font-size:11px;color:var(--text3)">${fm(p.bp)} risk</div>`:''}
          </div>
        </div>`).join('')||'<div style="font-size:13px;color:var(--text3)">No alerts in next 60 days.</div>'}
      </div>
      <div class="cht-c">
        <div class="cht-t">Revenue risk by product line</div>
        <div class="cht-s">Active projected BO &#183; ${fm(plTotal)} total</div>
        ${pieHTML()}
      </div>
    </div>`;
}

function goToFiltered(f){
  dashFilter=f||null;
  showTab('tracker',document.querySelectorAll('.nav-tab')[0]);
  renderSB();
  const first=sortP(P.filter(p=>!dashFilter||effs(p)===dashFilter))[0];
  if(first){selId=first.id;renderDetail();}
}

// &#9472;&#9472; Closed tab &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function renderClosed(){
  const el=document.getElementById('closed-content');if(!el)return;
  const totBOA=closed.reduce((s,p)=>s+(p.bp||0),0);
  const allDays=closed.map(p=>{if(!p.add||!p.closed)return null;return Math.round((new Date(p.closed)-new Date(p.add))/864e5);}).filter(d=>d!==null);
  const gMTC=allDays.length?Math.round(allDays.reduce((a,b)=>a+b,0)/allDays.length):null;
  const onTime=closed.filter(p=>p.timing==='ontime').length;
  const late=closed.filter(p=>p.timing==='late').length;

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      <div class="pf-c"><div class="pf-l">Closed projects</div><div class="pf-v" style="color:var(--grn)">${closed.length}</div></div>
      <div class="pf-c"><div class="pf-l">Mean time to close</div><div class="pf-v" style="color:var(--purp)">${gMTC!==null?gMTC+'d':'&#8212;'}</div><div class="pf-s">avg across all closed</div></div>
      <div class="pf-c"><div class="pf-l">Total BO avoided</div><div class="pf-v" style="color:var(--grn)">${fm(totBOA)}</div></div>
      <div class="pf-c"><div class="pf-l">On time vs late</div><div class="pf-v" style="color:var(--grn)">${onTime}<span style="font-size:16px;color:var(--text3)"> / </span><span style="font-size:24px;font-weight:700;color:var(--red)">${late}</span></div><div class="pf-s">on time / late</div></div>
    </div>
    <div>${closed.sort((a,b)=>new Date(b.closed||0)-new Date(a.closed||0)).map(p=>{
      const days=p.add&&p.closed?Math.round((new Date(p.closed)-new Date(p.add))/864e5):null;
      const daysCls=days>90?'red':days>45?'amb':'grn';
      const upds=ufor(p.n);
      return`<div class="closed-row">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:600;color:var(--text2)">${p.n}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${p.o} &#183; ${p.cat} &#183; Added ${p.add} &#183; Closed ${p.closed||'&#8212;'}</div>
          ${(p.pl||[]).length?`<div class="pl-wrap" style="margin-top:5px">${p.pl.map(x=>`<span class="pl-tag">${x}</span>`).join('')}</div>`:''}
          ${upds.length?`<div style="font-size:12px;color:var(--text2);margin-top:6px;line-height:1.55">${upds[0].t}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0">
          ${p.timing?`<span class="timing-badge" style="background:${p.timing==='ontime'?'var(--grn-bg)':'var(--red-bg)'};color:${p.timing==='ontime'?'var(--grn)':'var(--red)'};border:1px solid ${p.timing==='ontime'?'var(--grn-border)':'var(--red-border)'}">${p.timing==='ontime'?'ON TIME On time':'LATE Late'}</span>`:''}
          ${days!==null?`<span class="days-badge" style="background:var(--${daysCls}-bg);color:var(--${daysCls});border:1px solid var(--${daysCls}-border)">${days}d</span>`:''}
          ${p.bp?`<span style="font-size:12px;font-weight:700;color:var(--grn)">${fm(p.bp)} avoided</span>`:''}
          ${upds.length?`<button class="va-btn" onclick="odraw('${p.n.replace(/'/g,"\\'")}')">History (${upds.length})</button>`:''}
        </div>
      </div>`;
    }).join('')||'<div class="empty"><div class="empty-ico"></div><div>No closed projects yet</div></div>'}
    </div>`;
}

// &#9472;&#9472; Tabs &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function showTab(name,btn){
  document.getElementById('tab-tracker').style.display=name==='tracker'?'flex':'none';
  document.getElementById('tab-dashboard').style.display=name==='dashboard'?'flex':'none';
  document.getElementById('tab-closed').style.display=name==='closed'?'flex':'none';
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(name==='dashboard')renderDash();
  if(name==='closed')renderClosed();
  if(name==='tracker'){dashFilter=null;renderSB();}
}

// &#9472;&#9472; Meeting &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function toggleMtg(){
  mtg=!mtg;document.body.classList.toggle('meeting',mtg);
  const btn=document.getElementById('mtg-btn'),clk=document.getElementById('clk');
  if(mtg){btn.className='mtg-btn on';btn.innerHTML='o Meeting ON';clk.style.display='';
    clkIv=setInterval(()=>{clk.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});},1000);
  }else{btn.className='mtg-btn off';btn.innerHTML='o Meeting OFF';clk.style.display='none';clearInterval(clkIv);}
  if(selId)renderDetail();
}

// &#9472;&#9472; Theme &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
function toggleTheme(){
  dark=!dark;document.body.classList.toggle('dark',dark);
  document.getElementById('theme-btn').textContent=dark?'[light]':'[dark]';
}

// &#9472;&#9472; Init &#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;&#9472;
renderSB();
selId=sortP(P)[0]?.id||null;
if(selId)renderDetail();
</script>
</body>
</html>
